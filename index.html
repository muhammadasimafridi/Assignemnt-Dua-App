<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dua App</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body{
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 15px;
            width: 100%;
            height: 100%;
        }
        h1{
         margin: 25px 0 10px 0;   
        }
        img{
            width: 300px;
            height: 350px;
        }
        div{
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-self: center;
            gap: 15px;
        }
        button{
            padding: 6px 25px;
        }
    </style>
</head>
<body>
    <h1>Dua App</h1>
    <img src="Pics/Dua1.jpg" alt="Dua Img">
    <div>
        <button class="nextBtn">Next Dua</button>
        <button class="previousBtn">Previous Dua</button>   
        <button class="startBtn">Start</button>   
    </div>
    <script>
        let img = document.querySelector("img");
        let nextBtn = document.querySelector(".nextBtn");
        let previousBtn = document.querySelector(".previousBtn");
        let startBtn = document.querySelector(".startBtn");
        let count = 1;
        nextBtn.addEventListener("click", () => {
            if(count < 7){
                count++;
                img.src = `Pics/Dua${count}.jpg`;
                console.log(count);
            }
        });
        previousBtn.addEventListener("click", () => {
            if(count > 1){
                count--;
                img.src = `Pics/Dua${count}.jpg`;
                console.log(count);
            }
        });
        startBtn.addEventListener("click", () => {
            count = 0;
            img.src = `Pics/Dua1.jpg`;
        });
    </script>
</body>
</html>
